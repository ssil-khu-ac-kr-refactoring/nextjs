# Umami 자체호스트용 — NAS 기존 docker-compose에 services로 추가하거나
# 별도 stack으로 띄우셔도 됩니다. 같은 docker network에 두면 됩니다.
#
# 1) NAS에서 컨테이너 2개 추가:
#    - umami        : Umami 앱 (Next.js)
#    - umami-db     : 전용 postgres (별도 권장; ssil-db와 분리)
#
# 2) NAS에서 외부 포트 3001로 노출 (NAS 다른 서비스와 안 겹치는 포트로 조정)
#
# 3) 브라우저에서 http://<NAS-IP>:3001 접속 → 초기 계정 admin / umami 로 로그인 → 즉시 비밀번호 변경
#
# 4) Umami 대시보드에서 "ssil.khu.ac.kr" 사이트 등록 → tracking code(script URL + website-id) 확인
#
# 5) ssil 앱의 .env.server 에 다음 두 줄 추가 후 ssil-compose 재시작:
#      NEXT_PUBLIC_UMAMI_SCRIPT_URL=http://<NAS-IP>:3001/script.js
#      NEXT_PUBLIC_UMAMI_WEBSITE_ID=<umami가-발급한-website-id>
#
# 주의: 사이트가 https인데 Umami가 http면 mixed content로 브라우저가 차단합니다.
#       Umami도 reverse proxy 뒤에 두고 https로 서빙하는 게 정석. 또는 동일 호스트에서 path 분리.

version: "3.8"

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: always
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:CHANGE_ME_STRONG_PASSWORD@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      # 32자 이상 랜덤 문자열로 교체
      APP_SECRET: CHANGE_ME_RANDOM_32_CHAR_STRING_xxxxxxxx
    depends_on:
      umami-db:
        condition: service_healthy
    init: true

  umami-db:
    image: postgres:16-alpine
    container_name: umami-db
    restart: always
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: CHANGE_ME_STRONG_PASSWORD
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  umami-db-data:
